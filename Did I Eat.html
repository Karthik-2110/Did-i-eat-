<body>

  <script type="text/babel" src="ios-frame.jsx"></script>

  <script type="text/babel" src="planner.jsx"></script>

  <script type="text/babel" src="cheat.jsx"></script>
  <script type="text/babel" src="profile.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    // Mount once everything has registered. Babel scripts are deferred,

    queueMicrotask(() => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App/>);
    });
  </script>
